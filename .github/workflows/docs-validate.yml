name: Validate Docs

on:
  pull_request:
  push:
    branches:
      - main
      - docs/mkdocs-wiki-integration
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: pip install mkdocs-material==9.*

      - name: Run documentation validation suite
        run: python -m unittest tests.test_docs_contracts
