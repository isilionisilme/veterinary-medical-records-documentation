site_name: Veterinary Medical Records Documentation
site_description: Wiki-style technical documentation for the Veterinary Medical Records project
docs_dir: .mkdocs
site_dir: _site

theme:
  name: material
  palette:
    scheme: default
    primary: teal
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

plugins:
  - search

nav:
  - Documentation:
      - Home: index.md
      - Shared Documentation:
          - 01-product: shared/01-product/index.md
          - 02-tech: shared/02-tech/index.md
          - 03-ops: shared/03-ops/index.md
          - 04-delivery: shared/04-delivery/index.md
          - 99-archive: shared/99-archive/index.md
      - Projects:
          - 2026-03-02 Veterinary Medical Records:
              - 01-product: projects/veterinary-medical-records/01-product/index.md
              - 02-tech: projects/veterinary-medical-records/02-tech/index.md
              - 03-ops: projects/veterinary-medical-records/03-ops/index.md
              - 04-delivery: projects/veterinary-medical-records/04-delivery/index.md
              - 99-archive: projects/veterinary-medical-records/99-archive/index.md
