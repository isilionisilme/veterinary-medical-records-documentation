site_name: Veterinary Medical Records Documentation
site_description: Wiki-style technical documentation for the Veterinary Medical Records project
docs_dir: .mkdocs
site_dir: _site

theme:
  name: material
  palette:
    scheme: default
    primary: teal
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

plugins:
  - search

nav:
  - Home: index.md
  - Projects:
      - Overview: projects/README.md
      - Veterinary Medical Records:
          - Product Design: projects/veterinary-medical-records/01-product/product-design.md
